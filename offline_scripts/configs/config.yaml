wandb_disabled: False
experiment: evaluation

data:
  dataset_path: /home/philipp/datasets/features/features/cleaned_epoched_eeg.npy
  validation_size: 0.15
  test_size: 0.15
  selected_classes: [1, 2, 3, 4]

training:
  k_fold_splits: 10
  epochs: 100
  batch_size: 25
  lr: 1e-3
  weight_decay: 1e-3
  early_stopping:
    enable: True
    patience: 5
    min_delta: 0.01

final:
  test_split: 0.2


model:
  load_model: False
  path: ./classifier_results
  lmda:
    chans: 32
    samples: 267
    channel_depth1: 24
    channel_depth2: 7